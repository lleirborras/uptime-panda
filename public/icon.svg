<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wrapper SVG that embeds the Uptime Panda PNG logo. Keeps the many
  `<object data="/icon.svg">` references in the Vue templates working
  unchanged while the underlying art is now the panda icon at icon.png.
  Replace icon.png to update the brand mark; this wrapper does not need
  to change.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet">
    <image x="0" y="0" width="512" height="512" xlink:href="/icon.png" />
</svg>
