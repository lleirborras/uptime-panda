name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  bump:
    # Skip version-bump commits themselves to avoid an infinite loop
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore: bump version')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0
          # GH_PAT is a fine-grained PAT with Contents:write on this repo.
          # Needed so the push is authenticated as the repo owner, who can
          # bypass the branch protection PR requirement.
          token: ${{ secrets.GH_PAT }}

      - name: Determine bump type from PR title
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Breaking change: any conventional-commit type followed by ! before the colon
          # e.g. feat!: …  or  fix(scope)!: …
          if echo "$PR_TITLE" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          # New feature (no breaking change)
          elif echo "$PR_TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          # fix / chore / perf / refactor / docs / style / test / build / ci
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # J: cache node_modules so npm version runs with a populated lockfile
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Cache/Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Bump version and push tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # npm version updates package.json + package-lock.json, commits, and tags
          npm version ${{ steps.bump.outputs.type }} -m "chore: bump version to %s [skip ci]"
          git push --follow-tags
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --verify-tag
