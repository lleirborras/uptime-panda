name: Deploy to Fly.io

# Runs after docker-publish.yml completes so the :latest image is ready.
# workflow_run is intentional here: it must wait for the image push to finish
# before deploying, and only fires from the protected default branch context.
on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["Publish Docker Image"]
    types: [completed]

permissions: {}

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master
        with:
          version: latest

      - name: Deploy latest release
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly deploy --image ghcr.io/lleirborras/uptime-panda:latest --remote-only
