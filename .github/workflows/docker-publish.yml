name: Publish Docker Image

# Fires when the version-bump workflow creates a new GitHub Release.
on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write   # needed to push to GHCR
      id-token: write   # needed for provenance attestations (I)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # C: cache node_modules to avoid re-downloading ~500 MB on every release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 24

      - name: Cache/Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}

      # Build the Vite frontend; the Dockerfile's build stage copies dist/ in.
      - name: Build frontend
        run: npm ci && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── standard image ────────────────────────────────────────────────────
      - name: Extract metadata (release)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lleirborras/uptime-panda
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (release)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/dockerfile
          target: release
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true   # I: supply-chain attestation
          sbom: true         # I: SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── rootless image ────────────────────────────────────────────────────
      - name: Extract metadata (rootless)
        id: meta-rootless
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lleirborras/uptime-panda
          tags: |
            type=semver,pattern={{version}}-rootless
            type=semver,pattern={{major}}.{{minor}}-rootless
            type=raw,value=latest-rootless

      - name: Build and push (rootless)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/dockerfile
          target: rootless
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta-rootless.outputs.tags }}
          labels: ${{ steps.meta-rootless.outputs.labels }}
          provenance: true   # I
          sbom: true         # I
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --image ghcr.io/lleirborras/uptime-panda:latest --remote-only
