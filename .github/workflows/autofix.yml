name: autofix.ci

on:
  push:
    branches: ["master", "1.23.X"]
  pull_request:
permissions: {}

jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }

      - name: Cache/Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix JavaScript/Vue linting issues
        run: npm run lint-fix:js
        continue-on-error: true

      - name: Auto-fix CSS/SCSS linting issues (Biome)
        run: npm run lint-fix:style
        continue-on-error: true

      - name: Auto-format code with Biome and Prettier (Vue only)
        run: npm run fmt
        continue-on-error: true

      - name: Compile TypeScript
        run: npm run tsc
        continue-on-error: true

      # autofix-ci/action requires the autofix.ci GitHub App installed on the
      # repository. The App is authorized on louislam/uptime-kuma but not on
      # forks, so the step fails the workflow on every fork PR. Restrict to
      # the upstream repository.
      - if: github.repository == 'louislam/uptime-kuma'
        uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
